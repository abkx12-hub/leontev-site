name: One-time mobile hero pills fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-time-mobile-pills-fix.yml

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Patch mobile hero chips
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          old = """      .status-row { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
      .status-row::-webkit-scrollbar { display: none; }
      .pill { flex: 0 0 auto; min-height: 30px; font-size: 10px; padding: 0 10px; }"""

          new = """      .status-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; overflow: visible; padding-bottom: 0; }
      .status-row::-webkit-scrollbar { display: none; }
      .pill { justify-content: center; width: 100%; min-width: 0; min-height: 32px; padding: 0 8px; font-size: 10px; letter-spacing: .045em; white-space: nowrap; }"""

          if old not in html:
              raise SystemExit('Expected mobile hero chip CSS block was not found')

          html = html.replace(old, new, 1)
          path.write_text(html, encoding='utf-8')

          workflow = Path('.github/workflows/one-time-mobile-pills-fix.yml')
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit patched index
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/one-time-mobile-pills-fix.yml
          git commit -m "Fix mobile hero chips"
          git push
